server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Health check endpoint
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Proxy /api/* -> Kubernetes API server (in-cluster)
    # SA_TOKEN is injected by the entrypoint script at container start
    location /api/ {
        proxy_pass https://kubernetes.default.svc/;
        proxy_ssl_verify on;
        proxy_ssl_trusted_certificate /var/run/secrets/kubernetes.io/serviceaccount/ca.crt;
        proxy_ssl_server_name on;

        proxy_set_header Authorization "Bearer __SA_TOKEN__";
        proxy_set_header Accept application/json;
        proxy_http_version 1.1;
        proxy_read_timeout 30s;
        proxy_buffering off;
    }

    # React app - client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;
}
