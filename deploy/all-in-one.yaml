---
apiVersion: v1
kind: Namespace
metadata:
  name: crossplane-xr-manager
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: xr-manager
  namespace: crossplane-xr-manager
---
# ClusterRole: read Crossplane XRDs, claims, XRs, and managed resources
# + patch for pause/resume and YAML editing
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: xr-manager
rules:
  # Discover Crossplane XRDs
  - apiGroups: ["apiextensions.crossplane.io"]
    resources: ["compositeresourcedefinitions"]
    verbs: ["get", "list"]
  # API discovery (needed to resolve kind -> plural)
  - nonResourceURLs: ["/api", "/api/*", "/apis", "/apis/*"]
    verbs: ["get"]
  # Crossplane claims, composites, and managed resources (all API groups)
  # Scope this down to your specific API groups for stricter security
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: xr-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: xr-manager
subjects:
  - kind: ServiceAccount
    name: xr-manager
    namespace: crossplane-xr-manager
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: xr-manager
  namespace: crossplane-xr-manager
  labels:
    app: xr-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: xr-manager
  template:
    metadata:
      labels:
        app: xr-manager
    spec:
      serviceAccountName: xr-manager
      containers:
        - name: xr-manager
          # TODO: replace with your registry/image:tag
          image: eyalko1231/xr-manager:v0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            runAsNonRoot: false
---
apiVersion: v1
kind: Service
metadata:
  name: xr-manager
  namespace: crossplane-xr-manager
  labels:
    app: xr-manager
spec:
  type: ClusterIP
  selector:
    app: xr-manager
  ports:
    - port: 80
      targetPort: http
      name: http
